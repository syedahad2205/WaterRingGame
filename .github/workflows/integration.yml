# Integration Test Workflow
#
# Starts the Firebase Emulator Suite before running integration tests so
# that tests never hit production Firebase services. This workflow is
# triggered on pull requests and pushes to main.
#
# Requirements: 47.1

name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    name: Firebase Emulator + Integration Tests
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: WaterRingPuzzleGame/package-lock.json

      # ── Java (required by Firebase Emulator CLI) ─────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: WaterRingPuzzleGame
        run: npm ci

      # ── Firebase CLI ────────────────────────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      # ── Emulator cache ──────────────────────────────────────────────────────
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('WaterRingPuzzleGame/firebase.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-

      # ── Start emulators ─────────────────────────────────────────────────────
      - name: Start Firebase Emulator Suite
        working-directory: WaterRingPuzzleGame
        run: |
          firebase emulators:start \
            --only auth,firestore,functions,storage \
            --project demo-water-ring-game \
            &
          # Wait until the emulator UI is reachable (port 4000)
          npx wait-on http://localhost:4000 --timeout 60000

      # ── Integration tests ────────────────────────────────────────────────────
      - name: Run integration tests
        working-directory: WaterRingPuzzleGame
        env:
          NODE_ENV: test
          USE_FIREBASE_EMULATOR: 'true'
          FIRESTORE_EMULATOR_HOST: 'localhost:8080'
          FIREBASE_AUTH_EMULATOR_HOST: 'localhost:9099'
          FIREBASE_STORAGE_EMULATOR_HOST: 'localhost:9199'
          FUNCTIONS_EMULATOR_HOST: 'localhost:5001'
        run: npx jest --testPathPattern='__tests__/integration' --runInBand --forceExit

      # ── Upload test results ──────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: WaterRingPuzzleGame/coverage/
          retention-days: 7

# iOS Build Workflow
#
# Runs on macOS to verify the React Native project can be built for iOS.
# CocoaPods dependencies are cached by Podfile.lock hash to keep runner
# minutes low — macOS runners are expensive.
#
# NOTE: The ios/ directory is generated by `react-native init` and does not
# yet exist in the repo. When it is added the build steps below will become
# active automatically. Until then the workflow checks for the directory and
# exits cleanly so PRs are never blocked by a missing ios/ folder.
#
# Requirements: 48.1, 53.1

name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios-build:
    name: iOS Debug Build
    runs-on: macos-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Guard — skip gracefully if ios/ does not exist yet ──────────────────
      - name: Check ios/ directory exists
        id: ios_check
        run: |
          if [ -d "WaterRingPuzzleGame/ios" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ios/ directory not found — iOS native project has not been generated yet. Skipping build steps."
          fi

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        if: steps.ios_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: WaterRingPuzzleGame/package-lock.json

      # ── npm dependencies ─────────────────────────────────────────────────────
      - name: Install npm dependencies
        if: steps.ios_check.outputs.exists == 'true'
        working-directory: WaterRingPuzzleGame
        run: npm ci

      # ── Ruby / CocoaPods version pin ─────────────────────────────────────────
      # macos-latest ships with Ruby; pin the CocoaPods version so the cache
      # key stays stable across runner image updates.
      - name: Set up Ruby and CocoaPods
        if: steps.ios_check.outputs.exists == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # ── CocoaPods cache ──────────────────────────────────────────────────────
      # Keyed on Podfile.lock so any pod version change busts the cache.
      - name: Cache CocoaPods Pods directory
        if: steps.ios_check.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: WaterRingPuzzleGame/ios/Pods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('WaterRingPuzzleGame/ios/Podfile.lock') }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      # ── pod install ──────────────────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        if: steps.ios_check.outputs.exists == 'true'
        working-directory: WaterRingPuzzleGame/ios
        run: pod install --repo-update

      # ── xcodebuild ──────────────────────────────────────────────────────────
      # Builds the Debug configuration without code signing (CI-safe).
      # The workspace and scheme names follow the React Native CLI convention:
      #   workspace:  WaterRingPuzzleGame.xcworkspace
      #   scheme:     WaterRingPuzzleGame
      - name: Build iOS app (Debug, no signing)
        if: steps.ios_check.outputs.exists == 'true'
        working-directory: WaterRingPuzzleGame/ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace WaterRingPuzzleGame.xcworkspace \
            -scheme WaterRingPuzzleGame \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      # ── Build artifacts ──────────────────────────────────────────────────────
      - name: Upload build logs on failure
        if: failure() && steps.ios_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
          retention-days: 7

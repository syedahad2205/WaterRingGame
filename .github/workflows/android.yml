# Android Build Workflow
#
# Builds the Android debug APK using Gradle on Ubuntu.
# Gradle caches (~/.gradle/caches and ~/.gradle/wrapper) are keyed by Gradle
# wrapper and build-file hashes to keep build times fast.
#
# NOTE: The React Native Android project is generated by running
# `npx react-native build-android` (or the equivalent `cd android && ./gradlew`)
# from the WaterRingPuzzleGame directory. Until `android/` is initialised this
# workflow skips the Gradle build step and documents the required commands so
# that the first time a developer runs `npx react-native run-android` (which
# generates the `android/` directory) the workflow will pick it up automatically.
#
# Requirements: 48.1, 53.1

name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android-build:
    name: Android Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: WaterRingPuzzleGame/package-lock.json

      # ── Java (required by Gradle / Android build tools) ───────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── npm dependencies ─────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: WaterRingPuzzleGame
        run: npm ci

      # ── Gradle cache ─────────────────────────────────────────────────────────
      # Cache both the downloaded wrapper JARs and the local build cache so
      # subsequent runs only download changed dependencies.
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('WaterRingPuzzleGame/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-wrapper-${{ runner.os }}-

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('WaterRingPuzzleGame/android/**/*.gradle*', 'WaterRingPuzzleGame/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-caches-${{ runner.os }}-

      # ── Android SDK ──────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Check whether the Android project has been initialised ───────────────
      # The `android/` directory is created the first time a developer runs
      # `npx react-native run-android` locally. Until that happens we skip the
      # Gradle build step so CI does not fail on a project that has not yet
      # generated its native layer.
      - name: Check for Android project directory
        id: android_dir_check
        run: |
          if [ -d "WaterRingPuzzleGame/android" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::WaterRingPuzzleGame/android/ not found — skipping Gradle build."
            echo "Run 'npx react-native run-android' locally to generate the Android project."
          fi

      # ── Make gradlew executable ───────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        if: steps.android_dir_check.outputs.exists == 'true'
        working-directory: WaterRingPuzzleGame/android
        run: chmod +x gradlew

      # ── Build debug APK ───────────────────────────────────────────────────────
      # To initialise the Android project for the first time:
      #   cd WaterRingPuzzleGame
      #   npx react-native run-android          # generates android/ and builds
      # Subsequent builds from CI use:
      #   cd WaterRingPuzzleGame/android && ./gradlew assembleDebug
      - name: Build debug APK
        if: steps.android_dir_check.outputs.exists == 'true'
        working-directory: WaterRingPuzzleGame/android
        run: ./gradlew assembleDebug --no-daemon

      # ── Upload APK artifact ───────────────────────────────────────────────────
      - name: Upload debug APK
        if: steps.android_dir_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: WaterRingPuzzleGame/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

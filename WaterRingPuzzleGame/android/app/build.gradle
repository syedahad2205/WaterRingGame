apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
// ---------------------------------------------------------------------------
// Locate the node binary without relying on the Gradle daemon's minimal PATH.
// The daemon does not inherit shell PATH, so NVM/Homebrew paths are invisible.
// We search known filesystem locations directly — no shell subprocess needed.
// ---------------------------------------------------------------------------
def resolveNodePath() {
    // 0. Explicit override in local.properties (most reliable — set nodejs.path=/your/node/path)
    def localPropsFile = new File(rootDir, 'local.properties')
    if (localPropsFile.exists()) {
        def localProps = new Properties()
        localPropsFile.withInputStream { localProps.load(it) }
        def nodePath = localProps.getProperty('nodejs.path')
        if (nodePath && new File(nodePath).canExecute()) return nodePath
    }

    // 1. Common fixed locations (Homebrew Intel / Apple Silicon, system)
    def fixedPaths = [
        '/usr/local/bin/node',
        '/opt/homebrew/bin/node',
        '/opt/homebrew/opt/node/bin/node',
        '/usr/bin/node',
        '/usr/local/nodejs/bin/node',
    ]
    for (p in fixedPaths) {
        if (new File(p).canExecute()) return p
    }

    def home = System.getProperty('user.home')

    // 2. NVM — scan ~/.nvm/versions/node/<version>/bin/node, newest first
    def nvmDir = new File(home, '.nvm/versions/node')
    if (nvmDir.isDirectory()) {
        def nodeBin = nvmDir.listFiles()
            ?.toList()?.sort()?.reverse()
            ?.collect { new File(it, 'bin/node') }
            ?.find { it.canExecute() }
        if (nodeBin) return nodeBin.absolutePath
    }

    // 3. Volta
    def voltaBin = new File(home, '.volta/bin/node')
    if (voltaBin.canExecute()) return voltaBin.absolutePath

    // 4. fnm (Fast Node Manager)
    def fnmDir = new File(home, '.fnm/node-versions')
    if (fnmDir.isDirectory()) {
        def nodeBin = fnmDir.listFiles()
            ?.toList()?.sort()?.reverse()
            ?.collect { new File(it, 'installation/bin/node') }
            ?.find { it.canExecute() }
        if (nodeBin) return nodeBin.absolutePath
    }

    // 5. n version manager
    for (nPath in [new File(home, 'n/bin/node'), new File('/usr/local/n/versions')]) {
        if (nPath.canExecute()) return nPath.absolutePath
    }

    // 6. Shell lookup — try zsh then bash (sources login profile to pick up version managers)
    for (shell in ['/bin/zsh', '/bin/bash']) {
        try {
            def proc = new ProcessBuilder([shell, '-lc', 'which node'])
                .redirectErrorStream(true).start()
            def result = proc.inputStream.text.trim()
            proc.waitFor()
            if (result && new File(result).canExecute()) return result
        } catch (Exception ignored) {}
    }

    // Fallback: will fail with a clear error pointing here
    throw new GradleException(
        "\n\n[React Native] Cannot locate 'node'.\n" +
        "Fix: add the following line to android/local.properties:\n" +
        "  nodejs.path=/absolute/path/to/node\n" +
        "Run 'which node' in your terminal to find the path.\n"
    )
}

def resolvedNode = resolveNodePath()
logger.lifecycle("React Native — resolved node: ${resolvedNode}")

react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '..'
    // root = file("../")
    //   The folder where the react-native NPM package is. Default is ../node_modules/react-native
    // reactNativeDir = file("../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../node_modules/@react-native/codegen
    // codegenDir = file("../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../node_modules/react-native/cli.js
    // Explicitly set so Gradle never tries to auto-detect via a bare "node" subprocess.
    cliFile = file("../../node_modules/@react-native-community/cli/build/bin.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    // Explicit absolute path — daemon cannot rely on shell PATH for node.
    nodeExecutableAndArgs = [resolvedNode]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.syntaxandco.waterring"
    defaultConfig {
        applicationId "com.syntaxandco.waterring"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        // Required for react-native-reanimated
        manifestPlaceholders = [appAuthRedirectScheme: "com.syntaxandco.waterring"]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('WATER_RING_UPLOAD_STORE_FILE')) {
                storeFile file(WATER_RING_UPLOAD_STORE_FILE)
                storePassword WATER_RING_UPLOAD_STORE_PASSWORD
                keyAlias WATER_RING_UPLOAD_KEY_ALIAS
                keyPassword WATER_RING_UPLOAD_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release.storeFile ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    // Flipper integration is debug-only — release builds do not include Flipper
    debugImplementation("com.facebook.react:flipper-integration")

    // Firebase BoM (manages all Firebase library versions)
    implementation(platform("com.google.firebase:firebase-bom:33.5.1"))
    implementation("com.google.firebase:firebase-analytics")
    implementation("com.google.firebase:firebase-crashlytics")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}


apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)

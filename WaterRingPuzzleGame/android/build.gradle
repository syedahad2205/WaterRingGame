buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
        classpath("com.google.firebase:firebase-crashlytics-gradle:3.0.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// The React Native Gradle Plugin unconditionally adds the Sonatype snapshots repo to
// all subprojects for nightly/snapshot builds. For stable release builds, Gradle 8.x
// treats a 504 from Sonatype as a fatal resolution failure rather than falling through
// to the next repository (google()). Restrict the Sonatype repo to snapshot-only artifacts
// so Gradle skips it for stable dependencies like play-services-ads.
allprojects {
    repositories {
        all { ArtifactRepository repo ->
            if (repo instanceof MavenArtifactRepository) {
                if (repo.url.toString().contains('oss.sonatype.org/content/repositories/snapshots')) {
                    repo.mavenContent { MavenRepositoryContentDescriptor content ->
                        content.snapshotsOnly()
                    }
                }
            }
        }
    }
}
